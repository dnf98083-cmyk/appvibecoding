<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handwritten Digit Recognition</title>

  <!-- TensorFlow.js: runs ML models entirely in the browser -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 0.88rem;
      color: #64748b;
      margin-bottom: 32px;
    }

    .app-box {
      background: #1e293b;
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* Canvas drawing area */
    .canvas-wrapper {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #334155;
      margin-bottom: 16px;
      cursor: crosshair;
      background: #000;
    }

    #draw-canvas {
      display: block;
      width: 100%;
      height: 280px;
      touch-action: none; /* prevent scroll while drawing on mobile */
    }

    .canvas-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #334155;
      font-size: 0.9rem;
      pointer-events: none;
      text-align: center;
      line-height: 1.6;
    }

    /* Button row */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-recognize {
      background: linear-gradient(135deg, #818cf8, #c084fc);
      color: #fff;
    }
    .btn-clear {
      background: #334155;
      color: #94a3b8;
    }
    .btn-clear:hover { background: #475569; }

    /* Result display */
    #result-box {
      text-align: center;
      padding: 20px;
      border-radius: 12px;
      background: #0f172a;
      min-height: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .result-digit {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .result-confidence {
      font-size: 0.88rem;
      color: #64748b;
    }

    /* Probability bars for all 10 digits */
    .prob-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-top: 20px;
    }

    .prob-item {
      background: #0f172a;
      border-radius: 8px;
      padding: 8px 4px;
      text-align: center;
      transition: background 0.2s;
    }
    .prob-item.top { background: #1e3a5f; border: 1px solid #818cf8; }

    .prob-label { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
    .prob-bar-wrap { height: 40px; display: flex; align-items: flex-end; justify-content: center; }
    .prob-bar {
      width: 16px;
      background: #334155;
      border-radius: 3px 3px 0 0;
      transition: height 0.4s ease;
    }
    .prob-item.top .prob-bar { background: linear-gradient(to top, #818cf8, #c084fc); }
    .prob-pct { font-size: 0.68rem; color: #64748b; margin-top: 3px; }

    /* Status / loading */
    #status {
      text-align: center;
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 16px;
      min-height: 18px;
    }
    .loading-dot {
      display: inline-block;
      animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }
  </style>
</head>
<body>

<h1>✍️ Digit Recognition</h1>
<p class="subtitle">Draw a digit (0–9) and let the AI guess it</p>

<div class="app-box">

  <!-- Status line (model loading / ready) -->
  <div id="status">
    <span class="loading-dot">●</span>
    <span class="loading-dot" style="animation-delay:.2s">●</span>
    <span class="loading-dot" style="animation-delay:.4s">●</span>
    Loading model…
  </div>

  <!-- Drawing canvas -->
  <div class="canvas-wrapper">
    <canvas id="draw-canvas"></canvas>
    <div class="canvas-hint" id="canvas-hint">Draw a digit here</div>
  </div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button class="btn btn-recognize" id="btn-recognize" disabled>🔍 Recognize</button>
    <button class="btn btn-clear" id="btn-clear">🗑 Clear</button>
  </div>

  <!-- Prediction result -->
  <div id="result-box">
    <div style="color:#334155;font-size:0.9rem;">Result will appear here</div>
  </div>

  <!-- Probability bars for digits 0–9 -->
  <div class="prob-grid" id="prob-grid"></div>

</div>

<script>
  // ── Canvas setup ────────────────────────────────────────────────────────────
  const canvas  = document.getElementById('draw-canvas');
  const ctx     = canvas.getContext('2d');
  const CANVAS_W = 280; // internal resolution
  const CANVAS_H = 280;

  // Set internal resolution (independent from CSS display size)
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;

  // Black background (MNIST: white digit on black background)
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Drawing state
  let isDrawing = false;
  let hasStrokes = false; // track if user has drawn anything

  // Brush settings — thick white strokes simulate pen on paper
  ctx.lineWidth   = 22;
  ctx.lineCap     = 'round';
  ctx.lineJoin    = 'round';
  ctx.strokeStyle = '#fff';

  // Helper: get position relative to canvas
  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = CANVAS_W / rect.width;
    const scaleY = CANVAS_H / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * scaleX,
      y: (src.clientY - rect.top)  * scaleY
    };
  }

  // Mouse events
  canvas.addEventListener('mousedown', e => { isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
  canvas.addEventListener('mousemove', e => {
    if (!isDrawing) return;
    const p = getPos(e);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    markDrawn();
  });
  canvas.addEventListener('mouseup',   () => { isDrawing = false; });
  canvas.addEventListener('mouseleave',() => { isDrawing = false; });

  // Touch events (mobile support)
  canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, { passive: false });
  canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (!isDrawing) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); markDrawn(); }, { passive: false });
  canvas.addEventListener('touchend',   e => { e.preventDefault(); isDrawing = false; }, { passive: false });

  function markDrawn() {
    if (!hasStrokes) {
      hasStrokes = true;
      document.getElementById('canvas-hint').style.display = 'none';
    }
  }

  // Clear canvas
  document.getElementById('btn-clear').addEventListener('click', () => {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    hasStrokes = false;
    document.getElementById('canvas-hint').style.display = 'block';
    document.getElementById('result-box').innerHTML = '<div style="color:#334155;font-size:0.9rem;">Result will appear here</div>';
    renderProbBars(new Array(10).fill(0));
  });

  // ── Model loading ────────────────────────────────────────────────────────────
  let model = null;

  async function loadModel() {
    try {
      // Load pre-trained MNIST CNN model (hosted on Google Cloud Storage)
      model = await tf.loadLayersModel(
        'https://storage.googleapis.com/tfjs-examples/mnist-transfer-cnn/dist/model.json'
      );

      // Warm up: run a dummy inference so first real call is fast
      const dummy = tf.zeros([1, 28, 28, 1]);
      model.predict(dummy).dispose();
      dummy.dispose();

      setStatus('✅ Model ready — draw a digit!', true);
      document.getElementById('btn-recognize').disabled = false;

    } catch (err) {
      setStatus('❌ Failed to load model: ' + err.message);
      console.error(err);
    }
  }

  function setStatus(msg, ready = false) {
    const el = document.getElementById('status');
    el.innerHTML = ready
      ? `<span style="color:#4ade80;">${msg}</span>`
      : msg;
  }

  // ── Inference ────────────────────────────────────────────────────────────────
  document.getElementById('btn-recognize').addEventListener('click', recognize);

  async function recognize() {
    if (!model) { setStatus('Model not loaded yet.'); return; }
    if (!hasStrokes) { setStatus('Please draw a digit first!'); return; }

    // 1. Crop drawn region to 28×28 grayscale (MNIST input format)
    const tensor = tf.tidy(() => {
      // Read raw pixel data from canvas
      const imgData = ctx.getImageData(0, 0, CANVAS_W, CANVAS_H);

      // Convert to tensor: shape [280, 280, 4] (RGBA)
      const raw = tf.browser.fromPixels(imgData, 1); // 1 = grayscale

      // Resize to 28×28 (MNIST resolution)
      const resized = tf.image.resizeBilinear(raw, [28, 28]);

      // Normalize pixel values from [0,255] → [0,1]
      const normalized = resized.div(255.0);

      // Add batch dimension: [28,28,1] → [1,28,28,1]
      return normalized.expandDims(0);
    });

    // 2. Run model prediction
    const predictions = model.predict(tensor);
    const probs = await predictions.data(); // Float32Array of 10 values (digits 0-9)

    // 3. Clean up tensors to prevent memory leaks
    tensor.dispose();
    predictions.dispose();

    // 4. Find the digit with highest probability
    const probArr  = Array.from(probs);
    const topDigit = probArr.indexOf(Math.max(...probArr));
    const topProb  = (probArr[topDigit] * 100).toFixed(1);

    // 5. Display result
    document.getElementById('result-box').innerHTML = `
      <div class="result-digit">${topDigit}</div>
      <div class="result-confidence">Confidence: <strong>${topProb}%</strong></div>
    `;

    // 6. Update probability bars for all digits
    renderProbBars(probArr);
  }

  // ── Probability bar chart ────────────────────────────────────────────────────
  function renderProbBars(probs) {
    const grid = document.getElementById('prob-grid');

    // Build 10 bars (one per digit 0–9)
    grid.innerHTML = probs.map((p, digit) => {
      const pct     = (p * 100).toFixed(1);
      const barH    = Math.round(p * 40); // max 40px height
      const isTop   = p === Math.max(...probs) && p > 0;
      return `
        <div class="prob-item${isTop ? ' top' : ''}">
          <div class="prob-label">${digit}</div>
          <div class="prob-bar-wrap">
            <div class="prob-bar" style="height:${barH}px;"></div>
          </div>
          <div class="prob-pct">${pct}%</div>
        </div>
      `;
    }).join('');
  }

  // ── Init ─────────────────────────────────────────────────────────────────────
  // Initialize empty probability bars
  renderProbBars(new Array(10).fill(0));

  // Start loading the model
  loadModel();
</script>
</body>
</html>
