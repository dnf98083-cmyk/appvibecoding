<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상식 퀴즈 게임</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 40px;
    width: 100%;
    max-width: 640px;
    color: #fff;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  h1 { font-size: 2rem; text-align: center; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #aaa; margin-bottom: 32px; font-size: 0.9rem; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* 입력 */
  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 1rem;
    margin-bottom: 16px;
    outline: none;
    transition: border 0.2s;
  }
  input[type="text"]:focus { border-color: #e94560; }
  input[type="text"]::placeholder { color: #666; }

  /* 버튼 */
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 10px;
  }
  .btn-primary { background: #e94560; color: #fff; }
  .btn-primary:hover { background: #c73652; transform: translateY(-2px); }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
  .btn-secondary:hover { background: rgba(255,255,255,0.18); }
  .btn-cat {
    background: rgba(255,255,255,0.07);
    color: #fff;
    border: 1px solid rgba(255,255,255,0.15);
    padding: 12px;
    border-radius: 10px;
    width: calc(50% - 5px);
    margin: 4px 2px;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
  }
  .btn-cat:hover, .btn-cat.selected { background: #e94560; border-color: #e94560; }

  /* 진행 바 */
  .progress-wrap { background: rgba(255,255,255,0.1); border-radius: 99px; height: 6px; margin-bottom: 24px; }
  .progress-bar { background: #e94560; height: 6px; border-radius: 99px; transition: width 0.4s; }

  /* 문제 */
  .q-meta { font-size: 0.8rem; color: #aaa; margin-bottom: 12px; }
  .q-num { font-size: 0.9rem; color: #e94560; font-weight: 700; margin-bottom: 6px; }
  .q-text { font-size: 1.15rem; line-height: 1.6; margin-bottom: 24px; font-weight: 500; }

  .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
  .choice-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    padding: 14px 18px;
    border-radius: 12px;
    text-align: left;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.18s;
  }
  .choice-btn:hover:not(:disabled) { background: rgba(255,255,255,0.14); border-color: #e94560; }
  .choice-btn.correct { background: rgba(52,211,153,0.25); border-color: #34d399; }
  .choice-btn.wrong   { background: rgba(239,68,68,0.25);  border-color: #ef4444; }
  .choice-btn:disabled { cursor: default; }

  /* 피드백 */
  .feedback {
    padding: 14px 18px;
    border-radius: 12px;
    margin-bottom: 16px;
    font-size: 0.95rem;
    line-height: 1.6;
    display: none;
  }
  .feedback.show { display: block; }
  .feedback.correct-fb { background: rgba(52,211,153,0.15); border: 1px solid #34d399; }
  .feedback.wrong-fb   { background: rgba(239,68,68,0.15);  border: 1px solid #ef4444; }

  /* 결과 */
  .result-score { font-size: 3.5rem; font-weight: 800; text-align: center; color: #e94560; margin: 16px 0 4px; }
  .result-grade { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
  .result-msg   { text-align: center; color: #aaa; margin-bottom: 24px; }
  .result-bar-wrap { background: rgba(255,255,255,0.1); border-radius: 99px; height: 10px; margin-bottom: 28px; }
  .result-bar { background: linear-gradient(90deg, #e94560, #f5a623); height: 10px; border-radius: 99px; transition: width 1s ease; }

  /* 랭킹 */
  .ranking-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
  .ranking-table th { color: #aaa; font-weight: 500; padding: 8px 4px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
  .ranking-table td { padding: 10px 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .rank-1 td { color: #ffd700; font-weight: 700; }
  .rank-2 td { color: #c0c0c0; font-weight: 600; }
  .rank-3 td { color: #cd7f32; font-weight: 600; }

  .grade-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 99px;
    font-weight: 700;
    font-size: 0.85rem;
  }
  .g-S { background: #ffd700; color: #000; }
  .g-A { background: #e94560; color: #fff; }
  .g-B { background: #3b82f6; color: #fff; }
  .g-C { background: #6b7280; color: #fff; }
  .g-D { background: #374151; color: #aaa; }

  .section-title { font-size: 1rem; font-weight: 600; color: #aaa; margin-bottom: 16px; letter-spacing: 0.05em; text-transform: uppercase; }
  hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 20px 0; }
</style>
</head>
<body>
<div class="card">

  <!-- ① 시작 화면 -->
  <div id="screen-start" class="screen active">
    <h1>🧠 상식 퀴즈</h1>
    <p class="subtitle">한국사 · 과학 · 지리 · 일반상식 — 40문제</p>
    <input type="text" id="nickname-input" placeholder="닉네임을 입력하세요" maxlength="12">
    <p class="section-title">모드 선택</p>
    <button class="btn btn-primary" onclick="startGame('전체')">🎲 전체 랜덤</button>
    <div style="display:flex; flex-wrap:wrap; gap:0;">
      <button class="btn-cat" onclick="startGame('한국사')">🏯 한국사</button>
      <button class="btn-cat" onclick="startGame('과학')">🔬 과학</button>
      <button class="btn-cat" onclick="startGame('지리')">🌏 지리</button>
      <button class="btn-cat" onclick="startGame('일반상식')">💡 일반상식</button>
    </div>
    <hr>
    <button class="btn btn-secondary" onclick="showScreen('screen-ranking')">🏆 랭킹 보기</button>
  </div>

  <!-- ② 게임 화면 -->
  <div id="screen-game" class="screen">
    <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="q-num" id="q-num"></div>
    <div class="q-meta" id="q-meta"></div>
    <div class="q-text" id="q-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn btn-primary" id="next-btn" style="display:none" onclick="nextQuestion()">다음 문제 →</button>
  </div>

  <!-- ③ 결과 화면 -->
  <div id="screen-result" class="screen">
    <h1 style="margin-bottom:4px">결과</h1>
    <p class="subtitle" id="result-nickname"></p>
    <div class="result-score" id="result-score"></div>
    <div class="result-grade" id="result-grade"></div>
    <p class="result-msg" id="result-msg"></p>
    <div class="result-bar-wrap"><div class="result-bar" id="result-bar" style="width:0%"></div></div>
    <button class="btn btn-primary" onclick="showScreen('screen-start')">🔄 다시 도전</button>
    <button class="btn btn-secondary" onclick="showScreen('screen-ranking')">🏆 랭킹 보기</button>
  </div>

  <!-- ④ 랭킹 화면 -->
  <div id="screen-ranking" class="screen">
    <h1 style="margin-bottom:4px">🏆 랭킹</h1>
    <p class="subtitle">상위 10명</p>
    <div id="ranking-list"></div>
    <hr>
    <button class="btn btn-secondary" onclick="showScreen('screen-start')">← 돌아가기</button>
  </div>

</div>

<script>
// ── 문제 데이터 ──────────────────────────────────────────────────────────────
const QUESTIONS = [
  {id:1,category:"한국사",question:"조선을 건국한 인물은 누구인가?",choices:["이성계","이방원","왕건","견훤"],answer:0,explanation:"이성계는 1392년 위화도 회군 이후 고려를 멸망시키고 조선을 건국하였습니다."},
  {id:2,category:"한국사",question:"한국에서 최초로 금속 활자를 사용한 책은?",choices:["직지심체요절","훈민정음","동국통감","경국대전"],answer:0,explanation:"직지심체요절(1377년)은 현존하는 세계 최고(最古)의 금속활자 인쇄본입니다."},
  {id:3,category:"한국사",question:"3·1 운동이 일어난 연도는?",choices:["1919년","1910년","1945년","1905년"],answer:0,explanation:"3·1 운동은 1919년 3월 1일 일본 식민 통치에 항거하여 전국에서 일어난 독립운동입니다."},
  {id:4,category:"한국사",question:"임진왜란 당시 일본군을 물리친 해전에서 활약한 장군은?",choices:["이순신","권율","곽재우","신립"],answer:0,explanation:"이순신 장군은 거북선을 이용해 한산도 대첩 등 여러 해전에서 일본군을 물리쳤습니다."},
  {id:5,category:"한국사",question:"고조선을 건국한 신화 속 인물은?",choices:["단군왕검","주몽","박혁거세","온조"],answer:0,explanation:"단군왕검은 기원전 2333년에 고조선을 건국한 것으로 전해지는 신화 속 시조입니다."},
  {id:6,category:"한국사",question:"훈민정음을 창제한 조선의 왕은?",choices:["세종대왕","태종","성종","영조"],answer:0,explanation:"세종대왕은 1443년에 훈민정음을 창제하여 1446년에 반포하였습니다."},
  {id:7,category:"한국사",question:"6·25 전쟁이 발발한 연도는?",choices:["1950년","1945년","1953년","1948년"],answer:0,explanation:"6·25 전쟁은 1950년 6월 25일 북한의 남침으로 시작되었습니다."},
  {id:8,category:"한국사",question:"대한민국 초대 대통령은?",choices:["이승만","윤보선","박정희","김구"],answer:0,explanation:"이승만은 1948년 대한민국 정부 수립과 함께 초대 대통령으로 취임하였습니다."},
  {id:9,category:"한국사",question:"신라가 삼국을 통일한 연도는?",choices:["676년","660년","668년","562년"],answer:0,explanation:"신라는 676년 당나라 군대를 몰아내고 삼국 통일을 완성하였습니다."},
  {id:10,category:"한국사",question:"조선 시대 관리에게 토지를 나누어 준 제도는?",choices:["과전법","균전법","전시과","공전제"],answer:0,explanation:"과전법은 1391년 고려 말에 제정되어 조선 초까지 시행된 토지 분배 제도입니다."},

  {id:11,category:"과학",question:"빛의 속도는 진공에서 초속 약 몇 km인가?",choices:["30만 km","3만 km","300만 km","3000km"],answer:0,explanation:"진공에서 빛의 속도는 약 299,792km/s로 흔히 '약 30만 km/s'로 표현합니다."},
  {id:12,category:"과학",question:"물의 화학식은?",choices:["H₂O","CO₂","NaCl","H₂SO₄"],answer:0,explanation:"물은 수소 원자 2개와 산소 원자 1개로 이루어진 화합물로 화학식은 H₂O입니다."},
  {id:13,category:"과학",question:"지각에서 가장 풍부한 원소는?",choices:["산소","철","규소","알루미늄"],answer:0,explanation:"지각에서 가장 풍부한 원소는 산소(약 46%)입니다."},
  {id:14,category:"과학",question:"DNA의 이중 나선 구조를 발견한 과학자들은?",choices:["왓슨과 크릭","다윈과 멘델","퀴리와 아인슈타인","파스퇴르와 코흐"],answer:0,explanation:"제임스 왓슨과 프랜시스 크릭은 1953년 DNA의 이중 나선 구조를 발견하였습니다."},
  {id:15,category:"과학",question:"만유인력의 법칙을 발견한 과학자는?",choices:["아이작 뉴턴","갈릴레오 갈릴레이","알베르트 아인슈타인","닐스 보어"],answer:0,explanation:"아이작 뉴턴은 만유인력의 법칙을 발견한 것으로 알려져 있습니다."},
  {id:16,category:"과학",question:"태양계에서 가장 큰 행성은?",choices:["목성","토성","천왕성","해왕성"],answer:0,explanation:"목성은 태양계에서 가장 큰 행성으로 지구 직경의 약 11배에 달합니다."},
  {id:17,category:"과학",question:"광합성이 일어나는 세포 소기관은?",choices:["엽록체","미토콘드리아","리보솜","골지체"],answer:0,explanation:"엽록체는 식물 세포에 있는 소기관으로 빛 에너지를 이용해 광합성을 수행합니다."},
  {id:18,category:"과학",question:"소금의 화학식은?",choices:["NaCl","KCl","CaCl₂","MgCl₂"],answer:0,explanation:"소금(식염)은 나트륨(Na)과 염소(Cl)가 결합한 염화나트륨으로 화학식은 NaCl입니다."},
  {id:19,category:"과학",question:"인체에서 혈액을 온몸으로 순환시키는 기관은?",choices:["심장","폐","간","신장"],answer:0,explanation:"심장은 펌프 역할을 하여 혈액을 온몸으로 순환시키는 핵심 기관입니다."},
  {id:20,category:"과학",question:"원소 주기율표를 처음 만든 과학자는?",choices:["멘델레예프","라부아지에","돌턴","아보가드로"],answer:0,explanation:"드미트리 멘델레예프는 1869년 원소를 원자량 순으로 배열한 주기율표를 처음 만들었습니다."},

  {id:21,category:"지리",question:"세계에서 가장 긴 강은?",choices:["나일강","아마존강","양쯔강","미시시피강"],answer:0,explanation:"나일강은 길이 약 6,650km로 세계에서 가장 긴 강으로 알려져 있습니다."},
  {id:22,category:"지리",question:"세계에서 가장 넓은 나라는?",choices:["러시아","캐나다","미국","중국"],answer:0,explanation:"러시아는 면적 약 1,710만 km²로 세계에서 가장 넓은 나라입니다."},
  {id:23,category:"지리",question:"일본의 수도는?",choices:["도쿄","오사카","교토","나고야"],answer:0,explanation:"도쿄(東京)는 1869년 수도가 된 이후 일본의 정치·경제·문화 중심지입니다."},
  {id:24,category:"지리",question:"세계에서 가장 높은 산은?",choices:["에베레스트","K2","칸첸중가","로체"],answer:0,explanation:"에베레스트산은 해발 약 8,849m로 세계에서 가장 높은 산입니다."},
  {id:25,category:"지리",question:"아프리카에서 가장 긴 강은?",choices:["나일강","콩고강","니제르강","잠베지강"],answer:0,explanation:"나일강은 아프리카에서도 가장 길며 이집트 문명의 젖줄 역할을 하였습니다."},
  {id:26,category:"지리",question:"한반도에서 가장 높은 산은?",choices:["백두산","한라산","지리산","설악산"],answer:0,explanation:"백두산은 해발 2,744m로 한반도에서 가장 높은 산입니다."},
  {id:27,category:"지리",question:"브라질의 수도는?",choices:["브라질리아","상파울루","리우데자네이루","살바도르"],answer:0,explanation:"브라질리아는 1960년에 건설된 계획도시로 브라질의 수도입니다."},
  {id:28,category:"지리",question:"세계에서 가장 깊은 호수는?",choices:["바이칼호","카스피해","슈피리어호","빅토리아호"],answer:0,explanation:"시베리아에 위치한 바이칼호는 최대 수심 1,642m로 세계에서 가장 깊은 호수입니다."},
  {id:29,category:"지리",question:"유럽에서 가장 긴 강은?",choices:["볼가강","다뉴브강","라인강","템스강"],answer:0,explanation:"볼가강은 길이 약 3,690km로 유럽에서 가장 긴 강이며 러시아의 젖줄입니다."},
  {id:30,category:"지리",question:"적도가 통과하지 않는 나라는?",choices:["인도","에콰도르","케냐","인도네시아"],answer:0,explanation:"인도는 적도 북쪽에 위치하여 적도가 통과하지 않습니다."},

  {id:32,category:"일반상식",question:"유네스코(UNESCO)의 주요 목적은?",choices:["교육·과학·문화 진흥","국제 평화 유지","세계 무역 촉진","핵 비확산"],answer:0,explanation:"UNESCO는 교육, 과학, 문화 분야의 국제 협력을 통해 세계 평화를 증진시키는 UN 전문기구입니다."},

// ── 상태 ──────────────────────────────────────────────────────────────────────
let state = { nickname:'', questions:[], idx:0, score:0, answered:false };

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getGrade(score) {
  if (score >= 380) return { grade:'S', msg:'완벽해요! 상식왕! 🏆' };
  if (score >= 300) return { grade:'A', msg:'훌륭해요! 👍' };
  if (score >= 200) return { grade:'B', msg:'괜찮아요! 😊' };
  if (score >= 100) return { grade:'C', msg:'조금 더 공부해요! 📚' };
  return { grade:'D', msg:'다시 도전해보세요! 💪' };
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 'screen-ranking') renderRanking();
}

// ── 게임 시작 ─────────────────────────────────────────────────────────────────
function startGame(category) {
  const nicknameEl = document.getElementById('nickname-input');
  state.nickname = nicknameEl.value.trim() || '익명';
  const pool = category === '전체' ? QUESTIONS : QUESTIONS.filter(q => q.category === category);
  state.questions = shuffle(pool);
  state.idx = 0;
  state.score = 0;
  showScreen('screen-game');
  renderQuestion();
}

// ── 문제 렌더링 ───────────────────────────────────────────────────────────────
function renderQuestion() {
  const q = state.questions[state.idx];
  const total = state.questions.length;
  state.answered = false;

  document.getElementById('progress-bar').style.width = (state.idx / total * 100) + '%';
  document.getElementById('q-num').textContent = `문제 ${state.idx + 1} / ${total}`;
  document.getElementById('q-meta').textContent = `[${q.category}]`;
  document.getElementById('q-text').textContent = q.question;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${i + 1}. ${c}`;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.textContent = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'none';
  nextBtn.textContent = state.idx + 1 < total ? '다음 문제 →' : '결과 보기';
}

// ── 답 선택 ───────────────────────────────────────────────────────────────────
function selectAnswer(idx) {
  if (state.answered) return;
  state.answered = true;

  const q = state.questions[state.idx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  btns[q.answer].classList.add('correct');

  const fb = document.getElementById('feedback');
  if (idx === q.answer) {
    state.score += 10;
    btns[idx].classList.add('correct');
    const msgs = ['훌륭해요!','완벽합니다!','정확합니다!','대단해요!'];
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `✅ <strong>정답입니다!</strong> ${msgs[Math.floor(Math.random()*msgs.length)]}`;
  } else {
    btns[idx].classList.add('wrong');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `❌ <strong>오답입니다.</strong> 정답은 <strong>${q.choices[q.answer]}</strong><br>💡 ${q.explanation}`;
  }

  document.getElementById('next-btn').style.display = 'block';
}

// ── 다음 문제 ─────────────────────────────────────────────────────────────────
function nextQuestion() {
  state.idx++;
  if (state.idx < state.questions.length) {
    renderQuestion();
  } else {
    showResult();
  }
}

// ── 결과 ──────────────────────────────────────────────────────────────────────
function showResult() {
  showScreen('screen-result');
  const total = state.questions.length;
  const maxScore = total * 10;
  const pct = state.score / maxScore * 100;
  const { grade, msg } = getGrade(state.score);

  document.getElementById('result-nickname').textContent = state.nickname + '님의 결과';
  document.getElementById('result-score').textContent = state.score + '점';
  document.getElementById('result-grade').innerHTML = `<span class="grade-badge g-${grade}">${grade}</span>`;
  document.getElementById('result-msg').textContent = msg;

  setTimeout(() => {
    document.getElementById('result-bar').style.width = pct + '%';
  }, 100);

  saveRanking(state.nickname, state.score, grade);
}

// ── 랭킹 저장/조회 ────────────────────────────────────────────────────────────
function saveRanking(nickname, score, grade) {
  const rankings = JSON.parse(localStorage.getItem('quiz_rankings') || '[]');
  rankings.push({ nickname, score, grade, date: new Date().toLocaleDateString('ko-KR') });
  localStorage.setItem('quiz_rankings', JSON.stringify(rankings));
}

function renderRanking() {
  const rankings = JSON.parse(localStorage.getItem('quiz_rankings') || '[]');
  const top10 = rankings.sort((a, b) => b.score - a.score).slice(0, 10);
  const el = document.getElementById('ranking-list');

  if (top10.length === 0) {
    el.innerHTML = '<p style="color:#666; text-align:center; padding:20px">아직 기록이 없습니다.</p>';
    return;
  }

  let html = '<table class="ranking-table"><thead><tr><th>순위</th><th>닉네임</th><th>점수</th><th>등급</th><th>날짜</th></tr></thead><tbody>';
  top10.forEach((r, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : i + 1;
    html += `<tr class="rank-${i+1}">
      <td>${medal}</td>
      <td>${r.nickname}</td>
      <td><strong>${r.score}점</strong></td>
      <td><span class="grade-badge g-${r.grade}">${r.grade}</span></td>
      <td style="color:#888;font-size:0.85rem">${r.date}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
}

// 엔터 키로 게임 시작
document.getElementById('nickname-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame('전체');
});
</script>
