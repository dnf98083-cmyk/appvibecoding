<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>쇼핑 리스트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 40px 16px 80px;
}

.app {
  background: #fff;
  border-radius: 24px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  overflow: hidden;
}

/* 헤더 */
.header {
  background: linear-gradient(135deg, #667eea, #764ba2);
  padding: 28px 24px 20px;
  color: #fff;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.header .summary {
  font-size: 0.85rem;
  opacity: 0.8;
}

/* 진행 바 */
.progress-wrap {
  padding: 0 24px 20px;
  background: linear-gradient(135deg, #667eea, #764ba2);
}
.progress-bar {
  height: 6px;
  background: rgba(255,255,255,0.25);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: #fff;
  border-radius: 99px;
  transition: width 0.4s ease;
  width: 0%;
}

/* 입력 영역 */
.input-section {
  padding: 20px 24px 0;
}
.input-row {
  display: flex;
  gap: 10px;
}
.input-row input {
  flex: 1;
  padding: 12px 16px;
  border: 2px solid #e2e8f0;
  border-radius: 12px;
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
  color: #1a202c;
}
.input-row input:focus { border-color: #667eea; }
.input-row input::placeholder { color: #a0aec0; }
.add-btn {
  padding: 12px 20px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 1.3rem;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  line-height: 1;
}
.add-btn:hover { opacity: 0.88; }
.add-btn:active { transform: scale(0.94); }

/* 필터 탭 */
.filter-row {
  display: flex;
  gap: 6px;
  padding: 16px 24px 0;
}
.filter-btn {
  flex: 1;
  padding: 7px 0;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  background: none;
  font-size: 0.82rem;
  font-weight: 600;
  color: #718096;
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn.active {
  border-color: #667eea;
  background: #ebf4ff;
  color: #667eea;
}

/* 리스트 */
.list-section {
  padding: 14px 24px 24px;
  min-height: 200px;
}

.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: #a0aec0;
}
.empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.9rem; }

ul { list-style: none; }

/* 아이템 */
.item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 14px;
  border-radius: 12px;
  margin-bottom: 8px;
  background: #f7fafc;
  border: 1px solid #e2e8f0;
  transition: all 0.2s;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(-8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.item:hover { border-color: #cbd5e0; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.item.done {
  background: #f0fff4;
  border-color: #c6f6d5;
}

/* 체크박스 */
.checkbox {
  width: 22px; height: 22px;
  border: 2px solid #cbd5e0;
  border-radius: 50%;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  background: #fff;
}
.checkbox:hover { border-color: #667eea; }
.item.done .checkbox {
  background: linear-gradient(135deg, #48bb78, #38a169);
  border-color: transparent;
}
.checkbox .check-icon { display: none; color: #fff; font-size: 0.75rem; font-weight: 700; }
.item.done .checkbox .check-icon { display: block; }

/* 텍스트 */
.item-text {
  flex: 1;
  font-size: 0.95rem;
  color: #2d3748;
  line-height: 1.4;
  word-break: break-all;
  transition: all 0.2s;
}
.item.done .item-text {
  text-decoration: line-through;
  color: #a0aec0;
}

/* 삭제 버튼 */
.del-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: #cbd5e0;
  font-size: 1.1rem;
  padding: 4px;
  border-radius: 6px;
  line-height: 1;
  transition: all 0.15s;
  flex-shrink: 0;
}
.del-btn:hover { color: #e53e3e; background: #fff5f5; }

/* 하단 액션 */
.footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px 20px;
  border-top: 1px solid #f0f4f8;
}
.footer .count { font-size: 0.82rem; color: #a0aec0; }
.clear-btn {
  background: none;
  border: none;
  font-size: 0.82rem;
  color: #fc8181;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
  transition: background 0.15s;
}
.clear-btn:hover { background: #fff5f5; }
.clear-btn:disabled { color: #cbd5e0; cursor: default; background: none; }

@media (max-width: 400px) {
  body { padding: 20px 10px 60px; }
  .header { padding: 22px 18px 16px; }
  .input-section, .filter-row, .list-section, .footer { padding-left: 16px; padding-right: 16px; }
}
</style>
</head>
<body>
<div class="app">

  <!-- 헤더 -->
  <div class="header">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="summary" id="summary">아이템을 추가해보세요</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
  </div>

  <!-- 입력 -->
  <div class="input-section">
    <div class="input-row">
      <input type="text" id="item-input" placeholder="추가할 항목 입력..." maxlength="50" autocomplete="off">
      <button class="add-btn" id="add-btn" title="추가">＋</button>
    </div>
  </div>

  <!-- 필터 -->
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="todo">미구매</button>
    <button class="filter-btn" data-filter="done">구매완료</button>
  </div>

  <!-- 리스트 -->
  <div class="list-section">
    <ul id="item-list"></ul>
    <div class="empty-state" id="empty">
      <div class="icon">🛍️</div>
      <p>목록이 비어있어요.<br>위에서 항목을 추가해보세요!</p>
    </div>
  </div>

  <!-- 하단 -->
  <div class="footer">
    <span class="count" id="footer-count"></span>
    <button class="clear-btn" id="clear-btn">완료 항목 삭제</button>
  </div>

</div>

<script>
// ── 상태 ──
const STORAGE_KEY = 'shopping_list';
let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let filter = 'all';

// ── 저장 ──
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

// ── 렌더 ──
function render() {
  const list  = document.getElementById('item-list');
  const empty = document.getElementById('empty');

  const filtered = items.filter(item => {
    if (filter === 'todo') return !item.done;
    if (filter === 'done') return  item.done;
    return true;
  });

  list.innerHTML = '';

  if (filtered.length === 0) {
    empty.style.display = 'block';
    const msg = filter === 'todo' ? '미구매 항목이 없어요! 🎉'
              : filter === 'done' ? '구매 완료 항목이 없어요.'
              : '목록이 비어있어요.\n위에서 항목을 추가해보세요!';
    empty.querySelector('p').innerHTML = msg.replace('\n', '<br>');
  } else {
    empty.style.display = 'none';
    const frag = document.createDocumentFragment();
    filtered.forEach(item => {
      const li = document.createElement('li');
      li.className = 'item' + (item.done ? ' done' : '');

      const checkbox = document.createElement('div');
      checkbox.className = 'checkbox';
      checkbox.innerHTML = '<span class="check-icon">✓</span>';
      checkbox.addEventListener('click', () => toggle(item.id));

      const text = document.createElement('span');
      text.className = 'item-text';
      text.textContent = item.text;

      const del = document.createElement('button');
      del.className = 'del-btn';
      del.textContent = '✕';
      del.title = '삭제';
      del.addEventListener('click', () => remove(item.id));

      li.appendChild(checkbox);
      li.appendChild(text);
      li.appendChild(del);
      frag.appendChild(li);
    });
    list.appendChild(frag);
  }

  updateMeta();
}

// ── 메타 업데이트 (요약·진행바·하단) ──
function updateMeta() {
  const total = items.length;
  const done  = items.filter(i => i.done).length;
  const pct   = total === 0 ? 0 : Math.round(done / total * 100);

  document.getElementById('progress').style.width = pct + '%';
  document.getElementById('summary').textContent =
    total === 0 ? '아이템을 추가해보세요'
    : `${done} / ${total} 구매 완료 (${pct}%)`;

  document.getElementById('footer-count').textContent =
    `총 ${total}개 · 남은 항목 ${total - done}개`;

  const clearBtn = document.getElementById('clear-btn');
  clearBtn.disabled = done === 0;
}

// ── 추가 ──
function addItem() {
  const input = document.getElementById('item-input');
  const text  = input.value.trim();
  if (!text) { input.focus(); return; }

  items.unshift({ id: Date.now(), text, done: false });
  save();
  render();

  input.value = '';
  input.focus();
}

// ── 토글 ──
function toggle(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.done = !item.done; save(); render(); }
}

// ── 삭제 ──
function remove(id) {
  items = items.filter(i => i.id !== id);
  save();
  render();
}

// ── 완료 항목 전체 삭제 ──
function clearDone() {
  items = items.filter(i => !i.done);
  save();
  render();
}

// ── 이벤트 ──
document.getElementById('add-btn').addEventListener('click', addItem);
document.getElementById('item-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});
document.getElementById('clear-btn').addEventListener('click', clearDone);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

// ── 초기 렌더 ──
render();
</script>
</body>
</html>
